<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Matching</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: #4ecdc4;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(78, 205, 196, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .donor-list {
            margin-top: 30px;
        }

        .donor-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #4ecdc4;
            transition: all 0.3s ease;
        }

        .donor-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .donor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .donor-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
        }

        .match-score {
            background: #4ecdc4;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .compatibility {
            background: #44a08d;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
        }

        .donor-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            font-size: 0.9rem;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
        }

        .detail-label {
            color: #666;
        }

        .detail-value {
            font-weight: 500;
            color: #333;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #4ecdc4;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4ecdc4;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤝 Donor Matching System</h1>
            <p>Find compatible blood donors using real BloodNet AI data</p>
        </div>

        <div class="card">
            <div class="error" id="error"></div>
            <div class="success" id="success"></div>
            
            <form id="donorForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="bloodType">Blood Type Needed</label>
                        <select id="bloodType" class="form-control" required>
                            <option value="">Select blood type...</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="urgency">Urgency Level</label>
                        <select id="urgency" class="form-control" required>
                            <option value="">Select urgency...</option>
                            <option value="routine">Routine</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                            <option value="critical">Critical</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn" id="searchBtn">
                    🔍 Find Donors
                </button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Searching donor database...</p>
            </div>

            <div class="donor-list" id="donorList"></div>
            
            <a href="/" class="back-btn">← Back to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('donorForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const bloodType = document.getElementById('bloodType').value;
            const urgency = document.getElementById('urgency').value;
            
            if (!bloodType || !urgency) {
                showError('Please fill in all fields');
                return;
            }

            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.textContent = 'Searching...';
            showLoading(true);

            try {
                const response = await fetch('/find_donors', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        blood_type: bloodType,
                        urgency: urgency
                    })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showDonors(data.donors, data);
                    showSuccess(data.message);
                } else {
                    showError(data.error || 'Search failed');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 Find Donors';
                showLoading(false);
            }
        });

        function showDonors(donors, data) {
            const donorList = document.getElementById('donorList');
            
            if (donors.length === 0) {
                donorList.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #666;">
                        <h3>No compatible donors found</h3>
                        <p>Try expanding search criteria or check back later.</p>
                    </div>
                `;
                return;
            }

            let html = `
                <h3 style="margin-bottom: 20px; color: #333;">
                    Found ${donors.length} Compatible Donors 
                    <span style="color: #4ecdc4;">(${data.total_available} total available)</span>
                </h3>
            `;

            donors.forEach(donor => {
                html += `
                    <div class="donor-card">
                        <div class="donor-header">
                            <div class="donor-name">${donor.name}</div>
                            <div>
                                <span class="match-score">${donor.match_score}% Match</span>
                                <span class="compatibility">${donor.compatibility}</span>
                            </div>
                        </div>
                        <div class="donor-details">
                            <div class="detail-item">
                                <span class="detail-label">Blood Type:</span>
                                <span class="detail-value">${donor.blood_type}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Distance:</span>
                                <span class="detail-value">${donor.distance?.toFixed(1) || 'N/A'} km</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Response Rate:</span>
                                <span class="detail-value">${(donor.response_rate * 100)?.toFixed(1) || 'N/A'}%</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Donations:</span>
                                <span class="detail-value">${donor.donation_count || 'N/A'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Last Donation:</span>
                                <span class="detail-value">${donor.last_donation_date || 'N/A'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Available:</span>
                                <span class="detail-value">${donor.next_available_date || 'N/A'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Contact:</span>
                                <span class="detail-value">${donor.contact_method || 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            donorList.innerHTML = html;
        }

        function showError(message) {
            document.getElementById('error').textContent = message;
            document.getElementById('error').style.display = 'block';
            document.getElementById('success').style.display = 'none';
        }

        function showSuccess(message) {
            document.getElementById('success').textContent = message;
            document.getElementById('success').style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('donorList').style.display = show ? 'none' : 'block';
        }
    </script>
</body>
</html>
